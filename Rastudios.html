<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA Studios | Modern Dynamic Architecture</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'arch-black': '#0a0a0a',
                        'arch-dark': '#121212',
                        'arch-gray': '#888888',
                        'arch-accent': '#c0a062', // Sophisticated metallic/gold
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Custom Styles & Animations */
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }
        
        .fade-in-section {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            will-change: opacity, visibility;
        }
        
        .fade-in-section.is-visible {
            opacity: 1;
            transform: none;
        }

        .project-card:hover .project-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 100%);
        }

        .project-image-container {
            overflow: hidden;
        }

        .project-card:hover img {
            transform: scale(1.05);
            transition: transform 1.5s ease;
        }
        
        .project-card img {
            transition: transform 1.5s ease;
        }

        @keyframes subtleZoom {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .animate-bg {
            animation: subtleZoom 30s infinite alternate ease-in-out;
        }
    </style>
</head>
<body class="antialiased selection:bg-arch-accent selection:text-black">

    <!-- Navigation -->
    <nav id="navbar" class="fixed w-full z-50 transition-all duration-500 py-6 px-6 md:px-12 bg-transparent">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <!-- Logo -->
            <a href="#home" class="text-2xl font-black tracking-tighter uppercase z-50 relative text-white">
                RA<span class="text-arch-accent">.</span>Studios
            </a>

            <!-- Desktop Menu -->
            <div class="hidden md:flex space-x-10 text-xs uppercase tracking-[0.2em] font-medium">
                <a href="#about" class="text-white hover:text-arch-accent transition-colors duration-300">About</a>
                <a href="#portfolio" class="text-white hover:text-arch-accent transition-colors duration-300">Portfolio</a>
                <a href="#services" class="text-white hover:text-arch-accent transition-colors duration-300">Services</a>
                <a href="#philosophy" class="text-white hover:text-arch-accent transition-colors duration-300">Philosophy</a>
                <a href="#contact" class="text-white hover:text-arch-accent transition-colors duration-300">Contact</a>
            </div>

            <!-- Mobile Menu Button -->
            <button id="mobile-menu-btn" class="md:hidden text-white z-50 focus:outline-none relative">
                <i class="fas fa-bars text-2xl"></i>
            </button>
        </div>

        <!-- Mobile Menu Overlay -->
        <div id="mobile-menu" class="fixed inset-0 bg-arch-black flex flex-col justify-center items-center space-y-8 text-xl uppercase tracking-[0.2em] font-medium transform translate-x-full transition-transform duration-500 z-40 hidden">
            <a href="#about" class="mobile-link text-white hover:text-arch-accent transition-colors">About</a>
            <a href="#portfolio" class="mobile-link text-white hover:text-arch-accent transition-colors">Portfolio</a>
            <a href="#services" class="mobile-link text-white hover:text-arch-accent transition-colors">Services</a>
            <a href="#philosophy" class="mobile-link text-white hover:text-arch-accent transition-colors">Philosophy</a>
            <a href="#contact" class="mobile-link text-white hover:text-arch-accent transition-colors">Contact</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <header id="home" class="relative h-screen flex items-center justify-center overflow-hidden">
        <!-- Animated Background Wrapper -->
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 bg-
